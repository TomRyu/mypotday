<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>곗돈 타는 날 — 창업 로드맵 트래커</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0C0D0F;
    --surface:  #13141A;
    --surface2: #1A1C24;
    --border:   rgba(255,255,255,0.06);
    --border2:  rgba(255,255,255,0.11);
    --text:     #EAE8E0;
    --muted:    #6B6A64;
    --muted2:   #9E9C94;

    /* 브랜드 컬러 — 따뜻한 골드 */
    --gold:      #E8A030;
    --gold-dim:  rgba(232,160,48,0.10);
    --gold-glow: rgba(232,160,48,0.20);

    --p2: #1D9E75;
    --p2-dim: rgba(29,158,117,0.12);
    --p3: #D85A30;
    --p3-dim: rgba(216,90,48,0.12);
    --p4: #7F77DD;
    --p4-dim: rgba(127,119,221,0.12);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    padding: 80px 40px 60px;
    max-width: 920px;
    margin: 0 auto;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -160px; right: -60px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(232,160,48,0.10) 0%, transparent 65%);
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -40px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(29,158,117,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--gold);
    border: 1px solid rgba(232,160,48,0.30);
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 32px;
    letter-spacing: 0.10em;
  }
  .hero-tag-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

  .hero-eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted2);
    letter-spacing: 0.12em;
    margin-bottom: 14px;
  }

  h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(40px, 7vw, 68px);
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  h1 .ko { color: var(--text); }
  h1 .accent { color: var(--gold); }

  .hero-en {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-bottom: 24px;
  }

  .hero-sub {
    font-size: 15px;
    color: var(--muted2);
    font-weight: 300;
    line-height: 1.75;
    max-width: 460px;
    margin-bottom: 44px;
    border-left: 2px solid rgba(232,160,48,0.35);
    padding-left: 16px;
  }

  /* ── OVERVIEW CARDS ── */
  .overview {
    max-width: 920px;
    margin: 0 auto 10px;
    padding: 0 40px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .ov-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 20px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .ov-card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .ov-num {
    font-family: 'Space Mono', monospace;
    font-size: 34px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
  }
  .ov-label { font-size: 11px; color: var(--muted); font-weight: 400; letter-spacing: 0.02em; }

  /* ── GLOBAL PROGRESS BAR ── */
  .global-bar-wrap {
    max-width: 920px;
    margin: 0 auto 52px;
    padding: 22px 40px 0;
  }
  .global-bar-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
    font-family: 'Space Mono', monospace;
  }
  .global-bar-track {
    height: 5px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .global-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--gold), #F0C060);
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 12px rgba(232,160,48,0.4);
  }

  /* ── PHASES ── */
  .phases {
    max-width: 920px;
    margin: 0 auto;
    padding: 0 40px 80px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .phase-wrap {
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .phase-wrap:hover { border-color: var(--border2); }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 24px;
    cursor: pointer;
    user-select: none;
  }
  .phase-header:hover { opacity: 0.9; }

  .phase-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  .phase-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 3px 10px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .phase-name { font-size: 14px; font-weight: 500; flex: 1; }
  .phase-period {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }
  .phase-pct {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    min-width: 36px;
    text-align: right;
  }
  .phase-chevron {
    color: var(--muted);
    font-size: 18px;
    transition: transform 0.22s;
    line-height: 1;
    margin-left: 4px;
  }
  .phase-chevron.open { transform: rotate(90deg); }

  .phase-bar { height: 2px; background: var(--border); }
  .phase-bar-fill { height: 100%; transition: width 0.4s ease; }

  .phase-body { display: none; padding: 6px 0 4px; }
  .phase-body.open { display: block; }

  /* ── TASKS ── */
  .cat-section { padding: 12px 24px 4px; }
  .cat-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2px;
  }

  .task-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .task-row:last-child { border-bottom: none; }
  .task-row:hover { opacity: 0.70; }

  .chk {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: 1.5px solid rgba(255,255,255,0.16);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 11px;
    color: #000;
    font-weight: 700;
  }

  .task-text {
    font-size: 14px;
    font-weight: 400;
    line-height: 1.55;
    flex: 1;
    color: var(--text);
    transition: color 0.15s;
  }
  .task-text.done { color: var(--muted); text-decoration: line-through; }

  .task-tag {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 10px;
    flex-shrink: 0;
    margin-top: 2px;
    letter-spacing: 0.02em;
  }

  /* ── FOOTER ── */
  .footer {
    max-width: 920px;
    margin: 0 auto;
    padding: 0 40px 52px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }
  .save-hint { display: flex; align-items: center; gap: 7px; }
  .save-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--p2); }

  /* ── DIVIDER ── */
  .section-divider {
    max-width: 920px;
    margin: 0 auto 36px;
    padding: 0 40px;
  }
  .divider-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border2), transparent);
  }

  @media (max-width: 640px) {
    .overview { grid-template-columns: repeat(2, 1fr); }
    h1 { font-size: 38px; }
    .hero, .overview, .phases, .global-bar-wrap, .footer, .section-divider { padding-left: 20px; padding-right: 20px; }
    .phase-period { display: none; }
    .hero-sub { font-size: 14px; }
  }
</style>
</head>

// ── STATE ──
let states = {};

function loadStates() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) states = JSON.parse(raw);
  } catch(e) { states = {}; }
}

function saveStates() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(states));
    const el = document.getElementById('save-status');
    const t = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
    el.textContent = `자동 저장 · ${t}`;
  } catch(e) {}
}

// ── RENDER ──
function render() {
  const container = document.getElementById('phases-container');

  // preserve open state
  const openMap = {};
  phases.forEach((_, pi) => {
    const b = document.getElementById(`body_ph_${pi}`);
    if (b) openMap[pi] = b.classList.contains('open');
  });

  container.innerHTML = '';

  let totalDone = 0;
  const totalAll = phases.reduce((s,p) => s + p.categories.reduce((ss,c) => ss + c.tasks.length, 0), 0);

  phases.forEach((phase, pi) => {
    const allTasks = phase.categories.flatMap(c => c.tasks);
    const done = allTasks.filter((_, ti) => states[`${pi}_${ti}`]).length;
    totalDone += done;
    const pct = allTasks.length ? Math.round(done / allTasks.length * 100) : 0;

    const wrap = document.createElement('div');
    wrap.className = 'phase-wrap';

    let bodyHtml = '';
    let gi = 0;
    phase.categories.forEach(cat => {
      bodyHtml += `<div class="cat-section"><div class="cat-label">${cat.name}</div>`;
      cat.tasks.forEach(task => {
        const key = `${pi}_${gi}`;
        const isDone = !!states[key];
        bodyHtml += `
          <div class="task-row" onclick="toggle('${key}')">
            <div class="chk" id="chk_${key}" style="${isDone ? `background:${phase.color};border-color:${phase.color}` : ''}">
              ${isDone ? '✓' : ''}
            </div>
            <div class="task-text${isDone ? ' done' : ''}" id="tt_${key}">${task.text}</div>
            <span class="task-tag" style="color:${task.tc};background:${task.tbg}">${task.tag}</span>
          </div>`;
        gi++;
      });
      bodyHtml += `</div>`;
    });

    const isOpen = pi in openMap ? openMap[pi] : pi === 0;

    wrap.innerHTML = `
      <div class="phase-header" onclick="togglePhase(${pi})" style="background:${phase.dimColor}">
        <div class="phase-dot" style="background:${phase.color}"></div>
        <span class="phase-label" style="color:${phase.color};background:${phase.dimColor};border:1px solid ${phase.color}35">${phase.label}</span>
        <span class="phase-name">${phase.name}</span>
        <span class="phase-period">${phase.period}</span>
        <span class="phase-pct" style="color:${phase.color}">${pct}%</span>
        <span class="phase-chevron${isOpen ? ' open' : ''}" id="chev_ph_${pi}">›</span>
      </div>
      <div class="phase-bar">
        <div class="phase-bar-fill" style="width:${pct}%;background:${phase.color}"></div>
      </div>
      <div class="phase-body${isOpen ? ' open' : ''}" id="body_ph_${pi}">${bodyHtml}</div>`;

    container.appendChild(wrap);
  });

  document.getElementById('ov-total').textContent   = totalAll;
  document.getElementById('ov-done').textContent    = totalDone;
  document.getElementById('ov-remain').textContent  = totalAll - totalDone;
  document.getElementById('ov-pct').textContent     = Math.round(totalDone / totalAll * 100) + '%';
  document.getElementById('global-bar').style.width = (totalDone / totalAll * 100) + '%';
  document.getElementById('gb-label').textContent   = `${totalDone} / ${totalAll} 완료`;
}

function toggle(key) {
  states[key] = !states[key];
  saveStates();
  render();
}

function togglePhase(pi) {
  const body = document.getElementById(`body_ph_${pi}`);
  const chev = document.getElementById(`chev_ph_${pi}`);
  if (!body) return;
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

loadStates();
render();
</script>
